version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - DYNATRACE_OTLP_ENDPOINT=${DYNATRACE_OTLP_ENDPOINT}
      - DYNATRACE_API_TOKEN=${DYNATRACE_API_TOKEN}
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
